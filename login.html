<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TalentTrack – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">TalentTrack</div>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="internships.html">Internships</a></li>
        <li><a href="companies.html">Companies</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="help.html">Help</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="login.html" class="login-link">Login</a></li>
        <li><a href="signup.html" class="signup-link">Sign Up</a></li>
      </ul>
      <div class="hamburger" id="hamburger">
        <i class="fas fa-bars"></i>
      </div>
    </div>
  </nav>
  <main class="login-main">
    <div class="login-card">
      <div class="role-switch">
        <button type="button" class="role-btn active" data-role="jobseeker"> Job Seeker</button>
        <button type="button" class="role-btn" data-role="recruiter">Recruiter / Company</button>
      </div>
      <form id="loginForm" novalidate>
        <div class="input-group">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="Email address" autocomplete="email">
        </div>
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Password" autocomplete="current-password">
          <i class="fas fa-eye-slash toggle-password" id="togglePassword"></i>
        </div>
        <div class="forgot-link">
          <a href="#" id="forgotPassword">Forgot password?</a>
        </div>
        <button type="submit" id="loginBtn" class="login-btn" disabled>
          <span class="btn-text">Log in</span>
          <span class="spinner hidden"><i class="fas fa-spinner fa-pulse"></i></span>
        </button>
        <div id="errorMessage" class="error-message"></div>
      </form>
      <p class="signup-prompt">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </main>
  <div id="toast" class="toast hidden"></div>
  <script src="login.js"></script>
</body>
</html>
