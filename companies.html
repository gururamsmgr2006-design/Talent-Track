<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TalentTrack – Top Companies</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="companies.css">
</head>
<body>

  <!-- Sticky Navbar (consistent with other pages) -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">TalentTrack</div>
      <ul class="nav-links" id="navLinks">
       <li><a href="index.html">Home</a></li>
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="internships.html">Internships</a></li>
        <li><a href="companies.html">Companies</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="help.html">Help</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="login.html" class="login-link">Login</a></li>
        <li><a href="signup.html" class="signup-link">Sign Up</a></li>
      </ul>
      <div class="hamburger" id="hamburger">
        <i class="fas fa-bars"></i>
      </div>
    </div>
  </nav>

  <main>
    <!-- Page Header -->
    <section class="page-header">
      <h1>Top Companies</h1>
      <p>Explore leading employers and start your career journey</p>
    </section>

    <!-- Search Section -->
    <section class="search-section">
      <div class="search-container">
        <div class="search-input-group">
          <i class="fas fa-search"></i>
          <input type="text" id="companySearch" placeholder="Search by company name...">
        </div>
      </div>
    </section>

    <!-- Companies Grid -->
    <section class="companies-section">
      <div class="companies-grid" id="companiesGrid">
        <!-- dynamic company cards injected via JS -->
        <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Loading companies...</div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <p>© 2025 TalentTrack — Discover your next workplace</p>
    </div>
  </footer>

  <script src="companies.js"></script>
</body>
</html>
