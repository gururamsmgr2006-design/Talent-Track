<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>TalentTrack – Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="signup.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">TalentTrack</div>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="jobs.html">Jobs</a></li>
        <li><a href="internships.html">Internships</a></li>
        <li><a href="companies.html">Companies</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="help.html">Help</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="login.html" class="login-link">Login</a></li>
        <li><a href="signup.html" class="signup-link">Sign Up</a></li>
      </ul>
      <div class="hamburger" id="hamburger">
        <i class="fas fa-bars"></i>
      </div>
    </div>
  </nav>
  <main class="signup-main">
    <div class="signup-card">
      <div class="role-switch">
        <button type="button" class="role-btn active" data-role="jobseeker"> Job Seeker</button>
        <button type="button" class="role-btn" data-role="recruiter"> Recruiter / Company</button>
      </div>
      <form id="signupForm" novalidate>
        <div id="dynamicFields"></div>
        <button type="submit" id="signupBtn" class="signup-btn" disabled>
          <span class="btn-text">Create account</span>
          <span class="spinner hidden"><i class="fas fa-spinner fa-pulse"></i></span>
        </button>
        <div id="formError" class="form-error"></div>
      </form>
      <p class="login-prompt">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </main>
  <div id="toast" class="toast hidden"></div>
  <script src="signup.js"></script>
</body>
</html>
